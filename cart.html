<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Giỏ hàng</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="navbar-placeholder"></div>
<script>
  fetch('navbar.html').then(res => res.text()).then(data => { document.getElementById('navbar-placeholder').innerHTML = data; });
</script>

<section class="cart-section">
  <div class="cart-box">
    <h2>Giỏ hàng</h2>
    <table class="table" id="cart-table">
      <thead>
        <tr>
          <th>Sản phẩm</th>
          <th>Giá</th>
          <th>Số lượng</th>
          <th>Xóa</th>
        </tr>
      </thead>
      <tbody id="cart-content"></tbody>
    </table>
    <div id="empty-msg" style="display:none; text-align:center;">Giỏ hàng trống. <a href="shop.html">Mua ngay</a></div>
    <div class="cart-action" id="cart-footer">
      <a href="checkout.html" class="btn btn-primary">Thanh toán</a>
      <button onclick="clearCart()" class="btn btn-outline">Xóa hết</button>
    </div>
  </div>
</section>

<script>
const products = {
  1: { title: "Dell XPS 13", price: 12500000 },
  2: { title: "iPhone 14", price: 7200000 },
  3: { title: "Razer Kraken X", price: 1150000 },
  4: { title: "AKKO Mechanical Keyboard", price: 950000 },
  5: { title: "Logitech G Pro Mouse", price: 520000 },
  6: { title: "JBL Pulse 4", price: 780000 },
  7: { title: "MacBook Air M2", price: 24500000 },
  8: { title: "Samsung Galaxy S23", price: 15900000 },
  9: { title: "Sony WH-1000XM5", price: 5200000 },
  10:{ title: "Corsair K70 RGB", price: 2500000 },
  11:{ title: "HP Pavilion 15", price: 10900000 },
  12:{ title: "Xiaomi Redmi Note 12", price: 4200000 },
  13:{ title: "HyperX Cloud II", price: 1490000 },
  14:{ title: "SteelSeries Apex 7", price: 3200000 },
  15:{ title: "Acer Swift 3", price: 12900000 },
  16:{ title: "OnePlus 11", price: 13900000 },
  17:{ title: "Anker Soundcore", price: 890000 },
  18:{ title: "MSI GF63", price: 17900000 },
  19:{ title: "Sennheiser HD 560S", price: 2990000 },
  20:{ title: "Microsoft Surface Keyboard", price: 1190000 }
};

let cart = JSON.parse(localStorage.getItem('cart')) || [];

const params = new URLSearchParams(window.location.search);
const addId = params.get("add");
if (addId && products[addId]) {
  const existing = cart.find(item => item.id == addId);
  if (existing) { existing.qty += 1; } 
  else { cart.push({ id: addId, qty: 1 }); }
  localStorage.setItem('cart', JSON.stringify(cart));
  window.history.replaceState({}, document.title, "cart.html"); // Xóa param trên URL
}

function renderCart() {
  const container = document.getElementById('cart-content');
  if (cart.length === 0) {
    document.getElementById('cart-table').style.display = 'none';
    document.getElementById('cart-footer').style.display = 'none';
    document.getElementById('empty-msg').style.display = 'block';
    return;
  }
  container.innerHTML = cart.map((item, index) => `
    <tr>
      <td>${products[item.id].title}</td>
      <td>${products[item.id].price.toLocaleString()}₫</td>
      <td><input type="number" value="${item.qty}" min="1" onchange="updateQty(${index}, this.value)"></td>
      <td><button onclick="removeItem(${index})">❌</button></td>
    </tr>
  `).join('');
}

function updateQty(index, val) {
  cart[index].qty = parseInt(val);
  localStorage.setItem('cart', JSON.stringify(cart));
}
  
function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem('cart', JSON.stringify(cart));
  renderCart();
}

function clearCart() {
  localStorage.removeItem('cart');
  cart = [];
  renderCart();
}

renderCart();
</script>
</body>
</html>
